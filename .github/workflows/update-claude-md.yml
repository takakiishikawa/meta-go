name: Update CLAUDE.md (All Repos)

on:
  workflow_dispatch:
    inputs:
      template_version:
        description: 'Template version (e.g., v2.0)'
        required: false
        default: 'v2.0'
      target_repos:
        description: 'Target repos ("all" or comma-separated: "native-go,care-go")'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run — show diff only, no PRs created'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"

jobs:
  update-claude-md:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [native-go, care-go, kenyaku-go, cook-go, physical-go, task-go, go-design-system, meta-go]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Update CLAUDE.md (${{ matrix.repo }})
        run: npx tsx scripts/setup/update-claude-md.ts
        env:
          TARGET_REPO: ${{ matrix.repo }}
          TARGET_REPOS: ${{ inputs.target_repos }}
          DRY_RUN: ${{ inputs.dry_run }}
          TEMPLATE_VERSION: ${{ inputs.template_version }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

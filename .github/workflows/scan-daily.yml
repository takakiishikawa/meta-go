name: Scan Daily (調査cron)

# clone系の重い違反検出。各goリポをcloneしてDBに違反item をUPSERTのみ。
# 修正PRは fix-routine.yml に委譲。

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '特定リポだけ実行する場合のリポ名'
        required: false
        type: string
  schedule:
    - cron: '0 9 * * *'  # JST 18:00 daily

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [native-go, care-go, kenyaku-go, cook-go, physical-go, task-go, go-design-system, meta-go]
        scanner: [code-quality, design-system, security, tech-stack]
        exclude:
          # designsystem は DS自身の評価対象外
          - repo: go-design-system
            scanner: design-system
          # designsystem は tech-stack policy も対象外（ライブラリ側）
          - repo: go-design-system
            scanner: tech-stack
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci

      - name: Run ${{ matrix.scanner }} scan for ${{ matrix.repo }}
        run: npx tsx scripts/scan/${{ matrix.scanner }}.ts
        env:
          TARGET_REPO: ${{ inputs.target_repo || matrix.repo }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  performance-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [native-go, care-go, kenyaku-go, cook-go, physical-go, task-go, go-design-system, meta-go]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - uses: browser-actions/setup-chrome@v1

      - name: Performance scan for ${{ matrix.repo }}
        run: npx tsx scripts/scan/performance.ts
        env:
          TARGET_REPO: ${{ inputs.target_repo || matrix.repo }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

name: Fix Routine (т«ЪУАїcron)

# DBсЂФТ║юсЂЙсЂБсЂЪ pending items (state='new') сѓњ batch сЂДтЈќсѓітЄ║сЂЌС┐«ТГБPRсѓњСйюТѕљсђѓ
# L1сЂ»УЄфтІЋсЃъсЃ╝сѓИсђЂL2сЂ»approval_queueсЂФуЕЇсѓђсђѓ
# тљёт«ЪУАїсЂД productсЂћсЂе FIX_BATCH_SIZE С╗ХтЄдуљє№╝ѕrate limitт»ЙуГќ№╝Ѕсђѓ

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'уЅ╣т«џсЃфсЃЮсЂасЂЉт«ЪУАїсЂЎсѓІта┤тљѕсЂ«сЃфсЃЮтљЇ'
        required: false
        type: string
      batch_size:
        description: '1т«ЪУАїсЂѓсЂЪсѓісЂ«batchсѓхсѓцсѓ║№╝ѕproductсЂћсЂе№╝Ѕ'
        required: false
        default: '10'
        type: string
# scheduleсЂ»meta-goсЂ«DBсЂї source of truthсђѓVercel Cron + dispatcher сЂДУхитІЋсђѓ

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [native-go, care-go, kenyaku-go, cook-go, physical-go, task-go, go-design-system, meta-go]
        fixer: [code-quality, design-system, security, tech-stack]
        exclude:
          - repo: go-design-system
            fixer: design-system
          - repo: go-design-system
            fixer: tech-stack
      fail-fast: false
      max-parallel: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci

      - name: Run ${{ matrix.fixer }} fix for ${{ matrix.repo }}
        run: npx tsx scripts/fix/${{ matrix.fixer }}.ts
        env:
          TARGET_REPO: ${{ inputs.target_repo || matrix.repo }}
          FIX_BATCH_SIZE: ${{ inputs.batch_size || '10' }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  performance-fix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [native-go, care-go, kenyaku-go, cook-go, physical-go, task-go, meta-go]
      fail-fast: false
      max-parallel: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci

      - name: Performance fix for ${{ matrix.repo }}
        run: npx tsx scripts/fix/performance.ts
        env:
          TARGET_REPO: ${{ inputs.target_repo || matrix.repo }}
          FIX_BATCH_SIZE: ${{ inputs.batch_size || '10' }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
